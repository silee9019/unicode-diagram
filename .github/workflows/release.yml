name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          - goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
            runner: [self-hosted, linux, x86_64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}" -o unid ./cmd/unid

      - name: Package binary
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="unid-${TAG}-${{ matrix.target }}.tar.gz"

          mkdir -p staging
          cp unid staging/
          cp LICENSE README.md staging/

          cd staging
          tar czf "../${ARCHIVE}" *
          cd ..

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            unid-*.tar.gz
            unid-*.tar.gz.sha256

  release:
    needs: build
    runs-on: [self-hosted, linux, x86_64]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/unid-*.tar.gz \
            artifacts/unid-*.tar.gz.sha256

  update-homebrew:
    needs: release
    runs-on: [self-hosted, linux, x86_64]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          MACOS_ARM_ARCHIVE="unid-${TAG}-aarch64-apple-darwin.tar.gz"
          LINUX_X86_ARCHIVE="unid-${TAG}-x86_64-unknown-linux-gnu.tar.gz"

          MACOS_ARM_SHA256=$(awk '{print $1}' "artifacts/${MACOS_ARM_ARCHIVE}.sha256")
          LINUX_X86_SHA256=$(awk '{print $1}' "artifacts/${LINUX_X86_ARCHIVE}.sha256")

          BASE_URL="https://github.com/silee-tools/unid/releases/download/${TAG}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/silee-tools/homebrew-tap.git" tap
          cd tap

          mkdir -p Formula

          cat > Formula/unid.rb << FORMULA
          class Unid < Formula
            desc "CLI tool for rendering ASCII diagrams using Unicode box-drawing characters"
            homepage "https://github.com/silee-tools/unid"
            license "MIT"
            version "${VERSION}"

            on_macos do
              url "${BASE_URL}/${MACOS_ARM_ARCHIVE}"
              sha256 "${MACOS_ARM_SHA256}"
            end

            on_linux do
              url "${BASE_URL}/${LINUX_X86_ARCHIVE}"
              sha256 "${LINUX_X86_SHA256}"
            end

            def install
              bin.install "unid"
            end

            test do
              assert_match "unid", shell_output("#{bin}/unid --help")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/unid.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/unid.rb
          git commit -m "unid ${VERSION}"
          git push
