name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "SemVer bump to apply when version is empty"
        type: choice
        options: [patch, minor, major]
        default: patch
      version:
        description: "Explicit version, with or without leading v"
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Verify build and tests
        run: |
          go build -o /dev/null ./cmd/unid
          go test ./...

      - name: Resolve release version
        id: version
        env:
          INPUT_BUMP: ${{ github.event.inputs.bump }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)
          if [ -z "${latest_tag}" ]; then
            latest_tag="v0.0.0"
          fi
          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${current}"

          bump="${INPUT_BUMP:-patch}"
          requested="${INPUT_VERSION:-}"

          if [ -n "${requested}" ]; then
            version="${requested#v}"
          else
            case "${bump}" in
              patch) version="${major}.${minor}.$((patch + 1))" ;;
              minor) version="${major}.$((minor + 1)).0" ;;
              major) version="$((major + 1)).0.0" ;;
              *) echo "Unsupported bump '${bump}'. Use patch, minor, major, or provide version." >&2; exit 1 ;;
            esac
          fi

          if ! [[ "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '${version}'. Expected MAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          tag="v${version}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists." >&2
            exit 1
          fi

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Create and push release tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

  build:
    needs: prepare
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
            runner: macos-latest
          - goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
            runner: [self-hosted, silee-local, amd64]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build release binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.prepare.outputs.version }}
        run: go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o unid ./cmd/unid

      - name: Package binary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          ARCHIVE="unid-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p staging
          cp unid staging/
          cp LICENSE README.md staging/
          cd staging
          tar czf "../${ARCHIVE}" *
          cd ..
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            unid-*.tar.gz
            unid-*.tar.gz.sha256

  release:
    needs: [prepare, build]
    runs-on: [self-hosted, linux, x86_64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/unid-*.tar.gz \
            artifacts/unid-*.tar.gz.sha256

  update-homebrew:
    needs: [prepare, release]
    runs-on: [self-hosted, linux, x86_64]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          MACOS_ARM_ARCHIVE="unid-${TAG}-aarch64-apple-darwin.tar.gz"
          LINUX_X86_ARCHIVE="unid-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
          MACOS_ARM_SHA256=$(awk '{print $1}' "artifacts/${MACOS_ARM_ARCHIVE}.sha256")
          LINUX_X86_SHA256=$(awk '{print $1}' "artifacts/${LINUX_X86_ARCHIVE}.sha256")
          BASE_URL="https://github.com/silee-tools/unid/releases/download/${TAG}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/silee-tools/homebrew-tap.git" tap
          cd tap
          mkdir -p Formula

          cat > Formula/unid.rb <<FORMULA
          # typed: false
          # frozen_string_literal: true

          class Unid < Formula
            desc "CLI tool for rendering ASCII diagrams using Unicode box-drawing characters"
            homepage "https://github.com/silee-tools/unid"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/${MACOS_ARM_ARCHIVE}"
                sha256 "${MACOS_ARM_SHA256}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "${BASE_URL}/${LINUX_X86_ARCHIVE}"
                sha256 "${LINUX_X86_SHA256}"
              end
            end

            def install
              bin.install "unid"
            end

            test do
              assert_match "unid", shell_output("#{bin}/unid --help 2>&1")
            end
          end
          FORMULA
          sed -i 's/^          //' Formula/unid.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/unid.rb
          git diff --cached --quiet || { git commit -m "unid: update to ${TAG}" && git push; }
