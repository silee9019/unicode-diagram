name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="unid-${TAG}-${{ matrix.target }}.tar.gz"

          mkdir -p staging
          cp "target/${{ matrix.target }}/release/unid" staging/
          cp LICENSE README.md staging/

          cd staging
          tar czf "../${ARCHIVE}" *
          cd ..

          shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            unid-*.tar.gz
            unid-*.tar.gz.sha256

  release:
    needs: build
    runs-on: [self-hosted, synology]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            artifacts/unid-*.tar.gz \
            artifacts/unid-*.tar.gz.sha256

  update-homebrew:
    needs: release
    runs-on: [self-hosted, synology]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          ARM_ARCHIVE="unid-${TAG}-aarch64-apple-darwin.tar.gz"
          X86_ARCHIVE="unid-${TAG}-x86_64-apple-darwin.tar.gz"

          ARM_SHA256=$(awk '{print $1}' "artifacts/${ARM_ARCHIVE}.sha256")
          X86_SHA256=$(awk '{print $1}' "artifacts/${X86_ARCHIVE}.sha256")

          BASE_URL="https://github.com/silee-tools/unicode-diagram/releases/download/${TAG}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/silee-tools/homebrew-tap.git" tap
          cd tap

          mkdir -p Formula

          cat > Formula/unid.rb << FORMULA
          class Unid < Formula
            desc "CLI tool for rendering ASCII diagrams using Unicode box-drawing characters"
            homepage "https://github.com/silee-tools/unicode-diagram"
            license "MIT"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/${ARM_ARCHIVE}"
                sha256 "${ARM_SHA256}"
              else
                url "${BASE_URL}/${X86_ARCHIVE}"
                sha256 "${X86_SHA256}"
              end
            end

            def install
              bin.install "unid"
            end

            test do
              assert_match "unid", shell_output("#{bin}/unid --help")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/unid.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/unid.rb
          git commit -m "unid ${VERSION}"
          git push
